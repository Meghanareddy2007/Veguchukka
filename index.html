<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>వేగుచుక్క దినపత్రిక</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #c0140a;
      --gold: #f5c800;
      --ink: #111111;
      --paper: #fdf8f0;
      --border: #d5c9b5;
    }

    body {
      background: var(--paper);
      font-family: Georgia, 'Arial Black', serif;
      color: var(--ink);
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      background: #c0140a;
      user-select: none;
      pointer-events: none;
    }

    .header img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      object-position: center;
      margin: 0 auto;
    }

    /* ── DATE BAR ── */
    .datebar {
      background: #ffffff;
      color: var(--red);
      text-align: center;
      padding: 5px 16px;
      font-size: 18px;
      letter-spacing: 0.06em;
      user-select: none;
      font-weight:bold;
    }

    /* ── CAPTURE AREA (header + datebar + news + footer) ── */
    #capture-area {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── PAGE WRAPPER ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 100px;
    }

    .page.capturing {
      padding-bottom: 24px;
    }

    /* ── TWO NEWS SECTIONS ── */
    .news-section {
      background: #fff;
      border: 1.5px solid var(--border);
      border-top: 4px solid var(--red);
      margin-bottom: 28px;
      padding: 18px;
      position: relative;
    }

    .news-section::before {
      content: attr(data-label);
      position: absolute;
      top: -1px;
      right: 12px;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      padding: 2px 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: Georgia, serif;
    }

    /* ── PHOTO AREA ── */
    .photo-wrap {
      width: 100%;
      aspect-ratio: 10/5;
      background: #e8dfd0;
      border: 1px dashed #b0a090;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      margin-bottom: 14px;
    }

    .photo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }

    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #999;
    }

    .photo-placeholder svg {
      width: 40px; height: 40px; opacity: 0.4;
    }

    .photo-placeholder span {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .upload-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 11px;
      padding: 5px 14px;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }

    .upload-btn:hover { background: var(--red); }
    input[type=file] { display: none; }

    /* ── HEADLINE ── */
    .headline {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      font-family: Georgia, serif;
    }

    /* ── MATTER / CONTENT ── */
    .matter {
      font-size: 1.5rem;
      line-height: 1.85;
      color: #333;
      margin-bottom: 14px;
      font-family:Verdana, Geneva, Tahoma, sans-serif;
      font-weight: 1000;
    }

    /* ── META ── */
    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #777;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .meta .reporter { color: var(--red); font-weight: 600; }

    [contenteditable]:focus {
      outline: 2px dashed var(--gold);
      outline-offset: 3px;
      background: #fffde8;
      border-radius: 2px;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      z-index: 999;
      flex-wrap: wrap;
      border-top: 2px solid #c0140a;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
    }

    /* action buttons */
    .btn {
      border: none;
      padding: 7px 14px;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 6px;
      font-weight: 700;
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.4); }
    .btn:active { transform: translateY(0); }
    .btn-save  { background: linear-gradient(135deg,#f5c800,#e6a800); color: #111; }
    .btn-jpg   { background: linear-gradient(135deg,#27ae60,#1e8449); color: #fff; }
    .btn-print { background: linear-gradient(135deg,#c0140a,#96100a); color: #fff; }
    .btn-clear { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #ccc; }
    .btn-clear:hover { background: rgba(255,255,255,0.15); }

    /* ── FOOTER ── */
    footer {
      background: #111;
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 12px 20px;
      font-size: 12px;
      letter-spacing: 0.06em;
      user-select: none;
    }

    footer strong { color: var(--gold); }

    @media print {
      .toolbar { display: none; }
      .upload-btn { display: none; }

      @page {
        size: auto;
        margin: 8mm;
      }

      html, body {
        height: auto;
        background: #fff;
      }

      .page {
        max-width: 100%;
        padding: 0;
        margin-bottom: 0;
      }

      .news-section {
        margin-bottom: 0;
        /* Don't lock the WHOLE section together — that forces big news
           blocks onto a fresh page, splitting header/matter/footer apart.
           Let it break, just avoid breaking right at the top edge. */
        page-break-inside: auto;
        break-inside: auto;
      }

      /* Keep only the small, indivisible pieces glued together */
      .photo-wrap {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* The long text itself must be ALLOWED to split across pages */
      .matter {
        page-break-inside: auto;
        break-inside: auto;
        orphans: 3;
        widows: 3;
      }

      /* Prevent the headline being orphaned at the bottom of a page
         right before the matter continues on the next */
      .headline {
        page-break-inside: avoid;
        break-inside: avoid;
        page-break-after: avoid;
        break-after: avoid;
      }

      .header {
        max-width: 100%;
      }

      .matter {
        line-height: 1.5;
      }

      footer {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }

    @media (max-width: 600px) {
      .headline { font-size: 1.2rem; }
    }


    /* Layout 1: image top, matter below (default) */
    .layout-1 .photo-wrap { display: flex; }
    .layout-1 .matter { display: block; }

    /* Layout 2: no image, only matter */
    .layout-2 .photo-wrap { display: none !important; }
    .layout-2 .matter { display: block; }


    /* text-block is invisible wrapper for layouts 1 & 2 */
    .text-block { display: contents; }
    .layout-3 .text-block { display: block; }
    /* Layout 3: image floats left, headline+matter start beside & continue below */
    .layout-3 .news-body {
      display: block !important;
      overflow: hidden;
    }
    .layout-3 .photo-wrap {
      float: left !important;
      width: 42% !important;
      aspect-ratio: unset !important;
      height: auto !important;
      min-height: 160px;
      margin: 0 16px 10px 0 !important;
      display: block !important;
    }
    .layout-3 .photo-wrap img {
      width: 100% !important;
      height: auto !important;
      object-fit: cover;
    }
    .layout-3 .photo-placeholder {
      min-height: 160px;
      width: 100%;
    }
    .layout-3 .text-block {
      display: block !important;
      overflow: visible;
    }
    .layout-3 .matter {
      display: block !important;
      margin-bottom: 0 !important;
    }

    /* ── DROPDOWN CONTROLS ── */
    .dd-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }
    .dd-wrap span.lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f5c800;
      white-space: nowrap;
    }
    .dd-select {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .dd-select:focus, .dd-select:hover { border-color: #f5c800; }
    .dd-select option { background: #1a1a2e; color: #fff; }

    /* colour swatch */
    .color-preview {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(0,0,0,0.5);
      transition: transform 0.2s;
    }
    .color-preview:hover { transform: scale(1.2); }

    /* divider between groups */
    .toolbar-divider {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }

    .btn-apply-color {
      background: linear-gradient(135deg,#f5c800,#e6a800);
      color: #111;
      border: none;
      font-size: 10px;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: transform 0.1s;
    }
    .btn-apply-color:hover { transform: scale(1.05); }
    .btn-reset-color {
      background: rgba(255,255,255,0.1);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn-reset-color:hover { background: rgba(255,255,255,0.2); color: #fff; }

    /* toolbar brand tag */
    .toolbar-brand {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── MULTI-IMAGE GRID inside photo-wrap ── */
    .photo-grid {
      display: grid;
      width: 100%;
      height: 100%;
      gap: 6px;
    }
    .photo-grid.count-1 { grid-template-columns: 1fr; }
    .photo-grid.count-2 { grid-template-columns: 1fr 1fr; }
    .photo-grid.count-3 { grid-template-columns: 1fr 1fr 1fr; }
    .photo-grid.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    .photo-slot {
      position: relative;
      background: #e8dfd0;
      border: 1px dashed #b0a090;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 120px;
    }
    .photo-slot img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
      position: absolute;
      top: 0; left: 0;
    }
    .photo-slot .slot-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #999;
      pointer-events: none;
    }
    .photo-slot .slot-placeholder svg { width: 32px; height: 32px; opacity: 0.4; }
    .photo-slot .slot-placeholder span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
    .photo-slot .upload-btn {
      position: absolute;
      bottom: 6px; right: 6px;
      font-size: 10px;
      padding: 3px 10px;
    }

    /* layout-3: photo-wrap becomes floated block, grid inside fills it */
    .layout-3 .photo-wrap {
      min-height: 140px;
    }
    .layout-3 .photo-grid { height: auto; min-height: 140px; }
    .layout-3 .photo-slot { min-height: 120px; }

  </style>
</head>

  <script>
    const months = ['జనవరి','ఫిబ్రవరి','మార్చి','ఏప్రిల్','మే','జూన్','జులై','ఆగస్టు','సెప్టెంబర్','అక్టోబర్','నవంబర్','డిసెంబర్'];
    const d = new Date();
    document.getElementById('datebar').textContent = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    document.getElementById('yr').textContent = d.getFullYear();

    document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    document.addEventListener('keydown', function (e) {
      const key = e.key ? e.key.toUpperCase() : '';
      if (e.key === 'F12') { e.preventDefault(); return; }
      if ((e.ctrlKey || e.metaKey) && (key === 'U' || key === 'S')) { e.preventDefault(); return; }
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (key === 'I' || key === 'J' || key === 'C')) { e.preventDefault(); return; }
    });

    // ── IMAGE SLOTS ──
    let currentImgCount = 1;

    function slotHTML(i) {
      return `
        <div class="photo-slot" id="slot${i}">
          <div class="slot-placeholder" id="ph${i}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <span>ఫోటో ${i}</span>
          </div>
          <img id="img${i}" alt="news photo ${i}" />
          <label class="upload-btn" for="file${i}">📷 Photo ${i}</label>
          <input type="file" id="file${i}" accept="image/*" onchange="loadSlotPhoto(this,${i})" style="display:none"/>
        </div>`;
    }

    function buildGrid(n) {
      const grid = document.getElementById('photo-grid');
      grid.className = 'photo-grid count-' + n;
      grid.innerHTML = '';
      for (let i = 1; i <= n; i++) {
        grid.insertAdjacentHTML('beforeend', slotHTML(i));
      }
    }

    function setImgCount(n) {
      currentImgCount = n;
      buildGrid(n);
      const dd = document.getElementById('dd-images');
      if (dd) dd.value = n;
    }

    function loadSlotPhoto(input, i) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.getElementById('img' + i);
        const ph  = document.getElementById('ph' + i);
        img.src = e.target.result;
        img.style.display = 'block';
        if (ph) ph.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    // legacy shim (used nowhere now but keeps savePage safe)
    function loadPhoto(input, imgId, phId) {
      loadSlotPhoto(input, imgId.replace('img',''));
    }

    // init grid with 1 slot on load
    buildGrid(1);

    function updateColorPreview() {
      const val = document.getElementById('dd-color').value;
      const preview = document.getElementById('color-preview');
      if (preview) preview.style.background = val;
    }

    // ── HEADLINE COLOUR ──
    function colorHeadline(color) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed) {
        alert('శీర్షికలో మాటలు సెలెక్ట్ చేసి తర్వాత బటన్ నొక్కండి.\n(Select words in the headline first, then click the colour button)');
        return;
      }
      const range = sel.getRangeAt(0);
      // Make sure selection is inside .headline
      const headline = document.querySelector('.headline');
      if (!headline.contains(range.commonAncestorContainer)) {
        alert('దయచేసి శీర్షిక లోపల మాటలు సెలెక్ట్ చేయండి.\n(Please select text inside the Headline only)');
        return;
      }
      if (color === '') {
        // Reset: unwrap any span.hl-red / span.hl-black inside selection
        document.execCommand('removeFormat', false, null);
      } else {
        // Wrap selection in a coloured span via execCommand foreColor
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, color);
      }
      sel.removeAllRanges();
    }

    function savePage() {
      const clone = document.documentElement.cloneNode(true);
      clone.querySelector('.toolbar').remove();
      clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
      clone.querySelectorAll('input[type=file]').forEach(el => el.remove());
      clone.querySelectorAll('.upload-btn').forEach(el => el.remove());
      const html = '<!DOCTYPE html>\n' + clone.outerHTML;
      const blob = new Blob([html], {type:'text/html'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'veguchukka_' + d.getFullYear() + '_' + String(d.getMonth()+1).padStart(2,'0') + '_' + String(d.getDate()).padStart(2,'0') + '.html';
      a.click();
    }

    function downloadJPG() {
      const target = document.getElementById('capture-area');
      const pageEl = target.querySelector('.page');
      const uploadBtns = target.querySelectorAll('.upload-btn');
      uploadBtns.forEach(el => el.style.visibility = 'hidden');
      pageEl.classList.add('capturing');

      html2canvas(target, {
        backgroundColor: '#fdf8f0',
        scale: 2,
        useCORS: true,
        allowTaint: true,
        logging: false
      }).then(canvas => {
        uploadBtns.forEach(el => el.style.visibility = '');
        pageEl.classList.remove('capturing');
        const link = document.createElement('a');
        link.download = 'veguchukka_' + d.getFullYear() + '_' + String(d.getMonth()+1).padStart(2,'0') + '_' + String(d.getDate()).padStart(2,'0') + '.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
      }).catch(err => {
        uploadBtns.forEach(el => el.style.visibility = '');
        pageEl.classList.remove('capturing');
        alert('JPG డౌన్‌లోడ్ విఫలమైంది. మళ్ళీ ప్రయత్నించండి. / JPG download failed, please try again.');
        console.error(err);
      });
    }

    function clearAll() {
      if (!confirm('అన్నీ తొలగించాలా?')) return;
      document.querySelectorAll('.headline[contenteditable]').forEach(el => el.textContent = '[శీర్షిక / HEADLINE]');
      document.querySelectorAll('.matter[contenteditable]').forEach(el => el.textContent = '[వార్తా విషయం ఇక్కడ రాయండి]');

      const img = document.getElementById('img1');
      const ph  = document.getElementById('ph1');
      img.src=''; img.style.display='none'; ph.style.display='flex';
    }

    // Layout switcher
    function setLayout(n) {
      const sec = document.querySelector('.news-section');
      sec.classList.remove('layout-1','layout-2','layout-3');
      sec.classList.add('layout-' + n);
      const dd = document.getElementById('dd-layout');
      if (dd) dd.value = n;
    }
    // Default layout
    setLayout(1);
  </script>
</body>
</html>
