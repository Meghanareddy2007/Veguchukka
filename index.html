<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>వేగుచుక్క దినపత్రిక</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red:#c0140a; --gold:#f5c800; --ink:#111111; --paper:#fdf8f0; --border:#d5c9b5; }
    body { background:var(--paper); font-family:Georgia,'Arial Black',serif; color:var(--ink); }

    .header { width:100%; background:#c0140a; user-select:none; pointer-events:none; }
    .header img { display:block; width:100%; height:auto; object-fit:cover; object-position:center; margin:0 auto; }

    .datebar { background:#ffffff; color:var(--red); text-align:center; padding:5px 16px; font-size:18px; letter-spacing:.06em; user-select:none; font-weight:bold; }

    #capture-area { max-width:900px; margin:0 auto; }

    .page { max-width:900px; margin:0 auto; padding:24px 16px 100px; }
    .page.capturing { padding-bottom:24px; }

    .news-section { background:#fff; border:1.5px solid var(--border); border-top:4px solid var(--red); margin-bottom:28px; padding:18px; position:relative; }
    .news-section::before { content:attr(data-label); position:absolute; top:-1px; right:12px; background:var(--red); color:#fff; font-size:10px; padding:2px 10px; letter-spacing:.1em; text-transform:uppercase; font-family:Georgia,serif; }

    .photo-wrap { width:100%; aspect-ratio:10/5; background:#e8dfd0; border:1px dashed #b0a090; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; margin-bottom:14px; }
    .photo-wrap img { width:100%; height:100%; object-fit:cover; display:none; }
    .photo-placeholder { display:flex; flex-direction:column; align-items:center; gap:8px; color:#999; }
    .photo-placeholder svg { width:40px; height:40px; opacity:.4; }
    .photo-placeholder span { font-size:12px; letter-spacing:.1em; text-transform:uppercase; }
    .upload-btn { position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,.6); color:#fff; font-size:11px; padding:5px 14px; cursor:pointer; border-radius:3px; letter-spacing:.05em; }
    .upload-btn:hover { background:var(--red); }
    input[type=file] { display:none; }

    .headline { font-size:2rem; font-weight:1000; line-height:1.35; margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:10px; font-family:Georgia,serif; }
    .matter { font-size:1.5rem; line-height:1.85; color:#333; margin-bottom:14px; font-family:Verdana,Geneva,Tahoma,sans-serif; font-weight:700; }
    .meta { display:flex; justify-content:space-between; font-size:12px; color:#777; border-top:1px solid var(--border); padding-top:8px; flex-wrap:wrap; gap:6px; }
    .meta .reporter { color:var(--red); font-weight:600; }
    [contenteditable]:focus { outline:2px dashed var(--gold); outline-offset:3px; background:#fffde8; border-radius:2px; }

    /* TOOLBAR */
    .toolbar { position:fixed; bottom:0; left:0; right:0; background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); color:#fff; display:flex; align-items:center; gap:8px; padding:8px 16px; z-index:999; flex-wrap:wrap; border-top:2px solid #c0140a; box-shadow:0 -4px 20px rgba(0,0,0,.5); max-height:70vh; overflow-y:auto; transition:max-height .25s ease,padding .25s ease,opacity .2s ease; }
    .toolbar.collapsed { max-height:0; padding-top:0; padding-bottom:0; opacity:0; overflow:hidden; border-top:none; box-shadow:none; pointer-events:none; }
    .toolbar-toggle { position:fixed; bottom:16px; right:16px; z-index:1000; width:52px; height:52px; border-radius:50%; border:2px solid #c0140a; background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); color:#f5c800; font-size:22px; display:flex; align-items:center; justify-content:center; cursor:grab; box-shadow:0 4px 14px rgba(0,0,0,.5); transition:transform .2s ease,box-shadow .2s ease; touch-action:none; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; }
    .toolbar-toggle:hover { transform:scale(1.08); }
    .toolbar-toggle:active,.toolbar-toggle.dragging { cursor:grabbing; transform:scale(.96); box-shadow:0 6px 20px rgba(0,0,0,.65); }
    @media print { .toolbar-toggle { display:none; } }

    .btn { border:none; padding:7px 14px; font-size:11px; cursor:pointer; letter-spacing:.06em; text-transform:uppercase; border-radius:6px; font-weight:700; transition:transform .1s,box-shadow .1s; display:flex; align-items:center; gap:5px; }
    .btn:hover { transform:translateY(-1px); box-shadow:0 3px 10px rgba(0,0,0,.4); }
    .btn:active { transform:translateY(0); }
    .btn-save  { background:linear-gradient(135deg,#f5c800,#e6a800); color:#111; }
    .btn-jpg   { background:linear-gradient(135deg,#27ae60,#1e8449); color:#fff; }
    .btn-print { background:linear-gradient(135deg,#c0140a,#96100a); color:#fff; }
    .btn-clear { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); color:#ccc; }
    .btn-clear:hover { background:rgba(255,255,255,.15); }
    .btn-post  { background:linear-gradient(135deg,#e67e00,#c96a00); color:#fff; }

    footer { background:#111; color:rgba(255,255,255,.7); text-align:center; padding:12px 20px; font-size:12px; letter-spacing:.06em; user-select:none; }
    footer strong { color:var(--gold); }

    @media print {
      .toolbar { display:none; } .upload-btn { display:none; }
      @page { size:auto; margin:8mm; }
      html,body { height:auto; background:#fff; }
      .page { max-width:100%; padding:0; margin-bottom:0; }
      #capture-area { width:100%; max-width:900px; margin:auto; }
      .news-section { margin-bottom:0; page-break-inside:auto; break-inside:auto; }
      .photo-wrap { page-break-inside:avoid; break-inside:avoid; }
      .matter { page-break-inside:auto; break-inside:auto; orphans:3; widows:3; line-height:1.5; }
      .headline { page-break-inside:avoid; break-inside:avoid; page-break-after:avoid; break-after:avoid; }
      .header { max-width:100%; }
      footer { page-break-inside:avoid; break-inside:avoid; }
    }
    @media (max-width:600px) { .headline { font-size:1.2rem; } }

    /* LAYOUTS */
    .layout-1 .photo-wrap { display:flex; } .layout-1 .matter { display:block; }
    .layout-2 .photo-wrap { display:none !important; } .layout-2 .matter { display:block; }
    .text-block { display:contents; }
    .layout-3 .text-block { display:block; }
    .layout-3 .news-body { display:block !important; overflow:hidden; }
    .layout-3 .photo-wrap { float:left !important; width:42% !important; aspect-ratio:unset !important; height:auto !important; min-height:160px; margin:0 16px 10px 0 !important; display:block !important; }
    .layout-3 .photo-wrap img { width:100% !important; height:auto !important; object-fit:cover; }
    .layout-3 .photo-placeholder { min-height:160px; width:100%; }
    .layout-3 .text-block { display:block !important; overflow:visible; }
    .layout-3 .matter { display:block !important; margin-bottom:0 !important; }

    /* DROPDOWNS */
    .dd-wrap { display:flex; align-items:center; gap:5px; padding:4px 10px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); border-radius:8px; backdrop-filter:blur(4px); }
    .dd-wrap span.lbl { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#f5c800; white-space:nowrap; }
    .dd-select { background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.2); border-radius:5px; font-size:11px; padding:4px 8px; cursor:pointer; outline:none; transition:border-color .2s; }
    .dd-select:focus,.dd-select:hover { border-color:#f5c800; }
    .dd-select option { background:#1a1a2e; color:#fff; }
    .color-preview { width:20px; height:20px; border-radius:50%; border:2px solid rgba(255,255,255,.4); flex-shrink:0; box-shadow:0 0 6px rgba(0,0,0,.5); transition:transform .2s; }
    .color-preview:hover { transform:scale(1.2); }
    .toolbar-divider { width:1px; height:28px; background:rgba(255,255,255,.15); flex-shrink:0; }
    .btn-apply-color { background:linear-gradient(135deg,#f5c800,#e6a800); color:#111; border:none; font-size:10px; padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:800; letter-spacing:.05em; text-transform:uppercase; transition:transform .1s; }
    .btn-apply-color:hover { transform:scale(1.05); }
    .btn-reset-color { background:rgba(255,255,255,.1); color:#ccc; border:1px solid rgba(255,255,255,.2); font-size:11px; padding:4px 8px; border-radius:5px; cursor:pointer; }
    .btn-reset-color:hover { background:rgba(255,255,255,.2); color:#fff; }
    .toolbar-brand { font-size:10px; color:rgba(255,255,255,.35); letter-spacing:.1em; text-transform:uppercase; margin-left:auto; white-space:nowrap; }

    /* PHOTO GRID */
    .photo-grid { display:grid; width:100%; height:100%; gap:6px; }
    .photo-grid.count-1 { grid-template-columns:1fr; }
    .photo-grid.count-2 { grid-template-columns:1fr 1fr; }
    .photo-grid.count-3 { grid-template-columns:1fr 1fr 1fr; }
    .photo-grid.count-4 { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
    .photo-slot { position:relative; background:#e8dfd0; border:1px dashed #b0a090; display:flex; align-items:center; justify-content:center; overflow:hidden; min-height:120px; }
    .photo-slot img { width:100%; height:100%; object-fit:cover; display:none; position:absolute; top:0; left:0; }
    .photo-slot .slot-placeholder { display:flex; flex-direction:column; align-items:center; gap:6px; color:#999; pointer-events:none; }
    .photo-slot .slot-placeholder svg { width:32px; height:32px; opacity:.4; }
    .photo-slot .slot-placeholder span { font-size:11px; text-transform:uppercase; letter-spacing:.08em; }
    .photo-slot .upload-btn { position:absolute; bottom:6px; right:6px; font-size:10px; padding:3px 10px; }
    .layout-3 .photo-wrap { min-height:140px; }
    .layout-3 .photo-grid { height:auto; min-height:140px; }
    .layout-3 .photo-slot { min-height:120px; }

    /* POST MODAL */
    #post-modal { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,.75); align-items:center; justify-content:center; }
    #post-modal .modal-box { background:#1a1a2e; border:2px solid #c0140a; border-radius:12px; padding:28px; max-width:440px; width:92%; box-shadow:0 20px 60px rgba(0,0,0,.7); color:#fff; position:relative; max-height:92vh; overflow-y:auto; }
    #post-modal h3 { color:#f5c800; margin:0 0 4px; font-size:1.1rem; }
    #post-modal p.sub { color:#aaa; font-size:12px; margin:0 0 18px; }
    .pm-label { font-size:11px; color:#f5c800; text-transform:uppercase; letter-spacing:.08em; display:block; margin-bottom:5px; }
    .pm-field { width:100%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:6px; padding:9px 12px; font-size:13px; outline:none; box-sizing:border-box; margin-bottom:14px; }
    .pm-field:focus { border-color:#f5c800; }
    select.pm-field { background:#1a1a2e; }
    #pm-status { display:none; margin-bottom:14px; padding:10px 14px; border-radius:6px; font-size:13px; font-weight:600; word-break:break-word; white-space:pre-line; }
    .pm-close { position:absolute; top:12px; right:14px; background:none; border:none; color:#aaa; font-size:20px; cursor:pointer; line-height:1; }
    .pm-close:hover { color:#fff; }
  </style>
</head>

        <option value="&#3253;&#3271;&#3240;&#3240;&#3235;&#3248;&#3149;&#3248;">&#3253;&#3271;&#3240;&#3240;&#3235;&#3248;&#3149;&#3248;</option>
        <option value="&#3246;&#3270;&#3074;&#3221;&#3265;&#3240;&#3265;&#3221;&#3240;&#3149;&#3240;">&#3246;&#3270;&#3074;&#3221;&#3265;&#3240;&#3265;&#3221;&#3240;&#3149;&#3240;</option>
        <option value="&#3238;&#3248;&#3238;&#3277;&#3238;&#3248;&#3149;&#3248;">&#3238;&#3248;&#3238;&#3277;&#3238;&#3248;&#3149;&#3248;</option>
        <option value="&#3246;&#3270;&#3228;&#3149;&#3228;&#3248;&#3149;&#3248;">&#3246;&#3270;&#3228;&#3149;&#3228;&#3248;&#3149;&#3248;</option>
      </select>

      <label class="pm-label">Summary (optional)</label>
      <textarea id="pm-summary" class="pm-field" rows="2" placeholder="వార్త సారాంశం..."></textarea>

      <div id="pm-status"></div>

      <div style="display:flex;gap:10px;margin-top:4px">
        <button id="pm-submit-btn" onclick="submitToWebsite()"
          style="flex:1;background:linear-gradient(135deg,#c0140a,#96100a);color:#fff;border:none;border-radius:6px;padding:12px;font-size:14px;font-weight:700;cursor:pointer">
          &#128640; పంపండి
        </button>
        <button onclick="closePostModal()"
          style="background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:12px 18px;font-size:13px;cursor:pointer">
          రద్దు
        </button>
      </div>
    </div>
  </div>

  <script>
    // Date
    const months = ['జనవరి','ఫిబ్రవరి','మార్చి','ఏప్రిల్','మే','జూన్','జులై','ఆగస్టు','సెప్టెంబర్','అక్టోబర్','నవంబర్','డిసెంబర్'];
    const d = new Date();
    document.getElementById('datebar').textContent = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    document.getElementById('yr').textContent = d.getFullYear();

    document.addEventListener('keydown', function(e) {
      const key = e.key ? e.key.toUpperCase() : '';
      if (e.key === 'F12') { e.preventDefault(); return; }
      if ((e.ctrlKey||e.metaKey) && (key==='U'||key==='S')) { e.preventDefault(); return; }
      if ((e.ctrlKey||e.metaKey) && e.shiftKey && (key==='I'||key==='J'||key==='C')) { e.preventDefault(); return; }
    });

    // IMAGE SLOTS
    let currentImgCount = 1;
    function slotHTML(i) {
      return `<div class="photo-slot" id="slot${i}">
        <div class="slot-placeholder" id="ph${i}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>ఫోటో ${i}</span>
        </div>
        <img id="img${i}" alt="news photo ${i}" />
        <label class="upload-btn" for="file${i}">📷 Photo ${i}</label>
        <input type="file" id="file${i}" accept="image/*" onchange="loadSlotPhoto(this,${i})" style="display:none"/>
      </div>`;
    }
    function buildGrid(n) {
      const grid = document.getElementById('photo-grid');
      grid.className = 'photo-grid count-' + n;
      grid.innerHTML = '';
      for (let i=1;i<=n;i++) grid.insertAdjacentHTML('beforeend', slotHTML(i));
    }
    function setImgCount(n) { currentImgCount=n; buildGrid(n); document.getElementById('dd-images').value=n; }
    function loadSlotPhoto(input, i) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img=document.getElementById('img'+i), ph=document.getElementById('ph'+i);
        img.src=e.target.result; img.style.display='block';
        if(ph) ph.style.display='none';
      };
      reader.readAsDataURL(file);
    }
    buildGrid(1);

    function updateColorPreview() {
      document.getElementById('color-preview').style.background = document.getElementById('dd-color').value;
    }
    function colorHeadline(color) {
      const sel = window.getSelection();
      if (!sel||sel.rangeCount===0||sel.isCollapsed) { alert('శీర్షికలో మాటలు సెలెక్ట్ చేసి తర్వాత బటన్ నొక్కండి.'); return; }
      const range = sel.getRangeAt(0);
      const headline = document.querySelector('.headline');
      if (!headline.contains(range.commonAncestorContainer)) { alert('దయచేసి శీర్షిక లోపల మాటలు సెలెక్ట్ చేయండి.'); return; }
      if (color==='') { document.execCommand('removeFormat',false,null); }
      else { document.execCommand('styleWithCSS',false,true); document.execCommand('foreColor',false,color); }
      sel.removeAllRanges();
    }

    // TOOLBAR TOGGLE
    function toggleToolbar() {
      const bar=document.getElementById('toolbar'), btn=document.getElementById('toolbar-toggle');
      const isCollapsed=bar.classList.toggle('collapsed');
      btn.textContent=isCollapsed?'⚙':'✖';
      btn.title=isCollapsed?'Open editor options':'Close editor options';
    }

    // DRAGGABLE TOGGLE BUTTON
    (function() {
      const btn=document.getElementById('toolbar-toggle');
      if(!btn) return;
      let startX=0,startY=0,originLeft=0,originTop=0,dragging=false,moved=false;
      const THRESHOLD=6;
      function clamp(left,top) {
        const m=4,ml=window.innerWidth-btn.offsetWidth-m,mt=window.innerHeight-btn.offsetHeight-m;
        return {left:Math.min(Math.max(left,m),Math.max(ml,m)),top:Math.min(Math.max(top,m),Math.max(mt,m))};
      }
      function ensureFree() {
        if(btn.dataset.freePositioned==='1') return;
        const r=btn.getBoundingClientRect();
        btn.style.left=r.left+'px'; btn.style.top=r.top+'px';
        btn.style.right='auto'; btn.style.bottom='auto';
        btn.dataset.freePositioned='1';
      }
      function onDown(e) {
        const p=e.touches?e.touches[0]:e;
        dragging=true; moved=false; startX=p.clientX; startY=p.clientY;
        const r=btn.getBoundingClientRect(); originLeft=r.left; originTop=r.top;
        btn.classList.add('dragging');
        window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
        window.addEventListener('touchmove',onMove,{passive:false}); window.addEventListener('touchend',onUp);
      }
      function onMove(e) {
        if(!dragging) return;
        const p=e.touches?e.touches[0]:e;
        const dx=p.clientX-startX, dy=p.clientY-startY;
        if(!moved&&Math.hypot(dx,dy)>THRESHOLD){moved=true;ensureFree();}
        if(moved){if(e.cancelable)e.preventDefault();const c=clamp(originLeft+dx,originTop+dy);btn.style.left=c.left+'px';btn.style.top=c.top+'px';}
      }
      function onUp() {
        dragging=false; btn.classList.remove('dragging');
        window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp);
        window.removeEventListener('touchmove',onMove); window.removeEventListener('touchend',onUp);
        if(moved){btn.dataset.justDragged='1';setTimeout(()=>{btn.dataset.justDragged='0';},0);}
      }
      window.addEventListener('resize',()=>{
        if(btn.dataset.freePositioned!=='1') return;
        const r=btn.getBoundingClientRect(),c=clamp(r.left,r.top);
        btn.style.left=c.left+'px'; btn.style.top=c.top+'px';
      });
      btn.addEventListener('mousedown',onDown);
      btn.addEventListener('touchstart',onDown,{passive:true});
      btn.addEventListener('click',function(e){if(btn.dataset.justDragged==='1'){e.preventDefault();e.stopPropagation();}},true);
    })();

    // DOWNLOAD JPG
    function downloadJPG() {
      const target=document.getElementById('capture-area');
      const pageEl=target.querySelector('.page');
      const uploadBtns=target.querySelectorAll('.upload-btn');
      uploadBtns.forEach(el=>el.style.visibility='hidden');
      pageEl.classList.add('capturing');
      const oldW=target.style.width, oldMW=target.style.maxWidth;
      target.style.width='900px'; target.style.maxWidth='900px';
      html2canvas(target,{backgroundColor:'#fdf8f0',scale:3,useCORS:true,allowTaint:true,logging:false,width:900,windowWidth:900}).then(canvas=>{
        target.style.width=oldW; target.style.maxWidth=oldMW;
        uploadBtns.forEach(el=>el.style.visibility='');
        pageEl.classList.remove('capturing');
        const link=document.createElement('a');
        link.download='veguchukka_'+d.getFullYear()+'_'+String(d.getMonth()+1).padStart(2,'0')+'_'+String(d.getDate()).padStart(2,'0')+'.jpg';
        link.href=canvas.toDataURL('image/jpeg',1.0); link.click();
      }).catch(err=>{
        target.style.width=oldW; target.style.maxWidth=oldMW;
        uploadBtns.forEach(el=>el.style.visibility='');
        pageEl.classList.remove('capturing');
        alert('JPG డౌన్‌లోడ్ విఫలమైంది. మళ్ళీ ప్రయత్నించండి.');
        console.error(err);
      });
    }

    function clearAll() {
      if(!confirm('అన్నీ తొలగించాలా?')) return;
      document.querySelectorAll('.headline[contenteditable]').forEach(el=>el.textContent='[శీర్షిక / HEADLINE]');
      document.querySelectorAll('.matter[contenteditable]').forEach(el=>el.textContent='[వార్తా విషయం ఇక్కడ రాయండి]');
      const img=document.getElementById('img1'),ph=document.getElementById('ph1');
      img.src=''; img.style.display='none'; ph.style.display='flex';
    }

    function setLayout(n) {
      const sec=document.querySelector('.news-section');
      sec.classList.remove('layout-1','layout-2','layout-3');
      sec.classList.add('layout-'+n);
      document.getElementById('dd-layout').value=n;
    }
    setLayout(1);

    // ── POST TO WEBSITE ──────────────────────────────────────────────────────

    function openPostModal()  { document.getElementById('post-modal').style.display='flex'; pmStatus('',''); }
    function closePostModal() { document.getElementById('post-modal').style.display='none'; }
    document.getElementById('post-modal').addEventListener('click', e=>{ if(e.target===document.getElementById('post-modal')) closePostModal(); });

    function pmStatus(msg, type) {
      const el=document.getElementById('pm-status');
      if(!msg){el.style.display='none';return;}
      el.style.display='block'; el.textContent=msg;
      const s={ok:{bg:'#1a4a2a',c:'#5ddf8c',b:'#2d7a45'},err:{bg:'#4a1a1a',c:'#ff7070',b:'#7a2d2d'},info:{bg:'#2a2a1a',c:'#f5c800',b:'#7a6a00'}}[type]||{bg:'#2a2a1a',c:'#f5c800',b:'#7a6a00'};
      el.style.background=s.bg; el.style.color=s.c; el.style.border='1px solid '+s.b; el.style.borderRadius='6px'; el.style.padding='10px 14px';
    }

    function getFirstImage() {
      for(let i=1;i<=4;i++){const img=document.getElementById('img'+i);if(img&&img.src&&img.src.startsWith('data:'))return img.src;}
      return '';
    }

    async function submitToWebsite() {
      const server   = (document.getElementById('pm-server').value.trim()).replace(/\/$/, '') || 'http://localhost:5000';
      const reporter = document.getElementById('pm-reporter').value.trim();
      const token    = document.getElementById('pm-token').value.trim();
      const category = document.getElementById('pm-category').value;
      const summary  = document.getElementById('pm-summary').value.trim();
      const title    = document.querySelector('.headline[contenteditable]')?.innerText.trim()||'';
      const content  = document.querySelector('.matter[contenteditable]')?.innerHTML.trim()||'';

      if(!server)   { pmStatus('Server URL నమోదు చేయండి.','err'); return; }
      if(!reporter)   { pmStatus('Reporter name నమోదు చేయండి.','err'); return; }
      if(!token)      { pmStatus('API Token నమోదు చేయండి.','err'); return; }
      if(!category)   { pmStatus('Category ఎంచుకోండి.','err'); return; }
      if(!title||['HEADLINE','[శీర్షిక / HEADLINE]','[శీర్షిక]'].includes(title))
                      { pmStatus('Headline నమోదు చేయండి.','err'); return; }
      if(!content||content.length<5) { pmStatus('Article content నమోదు చేయండి.','err'); return; }

      const btn=document.getElementById('pm-submit-btn');
      btn.textContent='⏳ పంపుతున్నాం...'; btn.disabled=true;
      pmStatus('సర్వర్‌కి కనెక్ట్ అవుతున్నాం...','info');

      const payload = { token, title, content, summary, category, reporter_name:reporter, image_data:getFirstImage() };

      function reset() { btn.textContent='🚀 పంపండి'; btn.disabled=false; }
      try {
        const res  = await fetch(server + '/api/submit', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const data = await res.json().catch(()=>({}));
        if(res.ok && data.success) {
          pmStatus('✅ విజయవంతంగా పంపబడింది!\nసంపాదకుని ఆమోదం కోసం వేచి ఉంది.','ok');
          btn.textContent='✅ పంపబడింది';
          setTimeout(()=>{ closePostModal(); reset(); }, 3000);
        } else {
          pmStatus('❌ '+(data.error==='Invalid token'?'Token తప్పుగా ఉంది. Dashboard నుండి కొత్త token తీసుకోండి.':data.error||'సర్వర్ లోపం'),'err');
          reset();
        }
      } catch(e) {
        pmStatus('❌ సర్వర్‌కి కనెక్ట్ కాలేదు.\nFlask app నడుస్తుందో చూడండి:\npython app.py\n\nలేదా Server URL సరిగా ఉందో చూడండి.','err');
        reset();
      }
    }
  </script>
